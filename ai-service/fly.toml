# Rename `app` to your actual Fly app name at `fly launch` / `fly apps create`.
app = "genora-ai-service"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[env]
  ENV = "production"
  # DATABASE_URL, INTERNAL_SERVICE_SECRET, GEMINI_API_KEY are set via
  # `fly secrets set` — never committed here.
